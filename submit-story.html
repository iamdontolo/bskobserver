<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Submit a Story | BSK Observer</title>
<meta name="description" content="Submit a news tip, community story, or investigative lead to the BSK Observer newsroom. Volunteer as a citizen journalist or community correspondent.">
<link rel="icon" href="assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head><body data-page="submit-story.html">
<div id="site-header"></div>
<section class="page-hero"><div class="container"><h1>Submit a Story</h1><p>Your tip could become the next BSK Observer investigation.</p></div></section>
<section><div class="container" style="max-width:820px">
  <p style="text-align:center;color:var(--muted);max-width:640px;margin:0 auto 2em">All submissions are treated with strict confidentiality. We protect our sources. For sensitive disclosures, use our secure investigations line at <strong>info@bskobserver.com</strong>.</p>
  <form class="form reveal">
    <div class="row">
      <div><label>Full Name (or "Anonymous")</label><input required></div>
      <div><label>Contact (Email or Phone)</label><input required></div>
    </div>
    <label>Story category</label>
    <select><option>Entertainment</option><option>Politics</option><option>Health</option><option>Mining</option><option>Volunteer / Intern</option></select>
    <label>News Headline</label><input required>
    <label>Story Detail</label><textarea required placeholder="Share the who, what, when, where and why. Attach any documents or links after submitting via email."></textarea>
    <label><input type="checkbox">Your Identity is Confidential With Us.</label>
    <div style="margin-top:1em"><button class="btn" type="submit">Submit to newsroom</button></div>
    <div class="form-status" role="status" aria-live="polite"></div>
  </form>
</div></section>
<div id="site-footer"></div>
<script src="js/layout.js"></script><script src="js/main.js"></script>
</body></html>
